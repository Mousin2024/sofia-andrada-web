<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contacto | Sofía Andrada</title>

<link rel="stylesheet" href="contact.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVBAR (IGUAL QUE HOME) -->

<header class="navbar">
  <div class="nav-inner">

    <img src="logo4.png" class="logo">

    <div class="menu-toggle" id="menu-toggle">
      ☰
    </div>

    <nav id="nav-menu">
      <a href="index.html">Inicio</a>
      <a href="https://instagram.com/sofiaandrada.maquilladora" target="_blank">Portfolio</a>
      <a href="contact.html">Contacto</a>
    </nav>

  </div>
</header>

<!-- HERO CONTACTO -->

<section class="contact-hero">
  <div class="overlay"></div>
  <h1>Contacto</h1>
</section>

<!-- FORMULARIO -->

<section class="contact">

  <div class="contact-container">

    <div class="contact-info">
      <p><strong>Teléfono:</strong> <a href="tel:600000000">600 00 00 00</a></p>
      <p><strong>Email:</strong> 
        <a href="mailto:sofiaandradamaquilladora@gmail.com">
          sofiaandradamaquilladora@gmail.com
        </a>
      </p>
    </div>

    <form class="contact-form" action="https://formsubmit.co/sofiaandradamaquilladora@gmail.com" method="POST">

      <input type="text" name="nombre" placeholder="Nombre completo" required>

      <input type="tel" name="telefono" placeholder="Teléfono" required>

      <input type="email" name="email" placeholder="Correo electrónico" required>

      <textarea name="mensaje" placeholder="Escribe tu mensaje..." required></textarea>

      <button type="submit">Enviar mensaje</button>

      <!-- Evita captcha -->
      <input type="hidden" name="_captcha" value="false">

    </form>

  </div>

</section>

<!-- SCRIPT MENU -->

<script>
const toggle = document.getElementById("menu-toggle");
const menu = document.getElementById("nav-menu");

toggle.addEventListener("click", () => {
  menu.classList.toggle("active");
});
</script>

</body>
</html>
