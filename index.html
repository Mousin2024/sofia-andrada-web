<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sofía Andrada | Maquilladora Profesional</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->

<header class="navbar">
  <div class="nav-inner">

    <img src="logo4.png" class="logo">

    <div class="menu-toggle" id="menu-toggle">
      ☰
    </div>

    <nav id="nav-menu">
      <a href="#">Inicio</a>
      <a href="https://instagram.com/sofiaandrada.maquilladora" target="_blank">Portfolio</a>
      <a href="contact.html">Contacto</a>
    </nav>

  </div>
</header>

<!-- HERO -->

<section class="hero">
  <div class="hero-overlay"></div>

  <div class="scroll-indicator">
    <img src="scroll.png">
  </div>
</section>

<!-- PORTFOLIO -->

<section class="portfolio">

  <div class="portfolio-container">

    <div class="portfolio-big">
      <img src="portfolio1.jpg">
    </div>

    <div class="portfolio-grid">

      <div class="portfolio-item">
        <img src="portfolio2.jpg">
      </div>

      <div class="portfolio-item">
        <img src="portfolio3.jpg">
      </div>

      <div class="portfolio-item">
        <img src="portfolio4.jpg">
      </div>

    </div>

    <!-- BOTÓN -->
    <div class="portfolio-button">
      <a href="https://www.instagram.com/sofiaandrada.maquilladora/" target="_blank">
        Descubre nuestros trabajos
      </a>
    </div>

  </div>

</section>
  <!-- CONTACTO FINAL -->

<section class="home-contact">

  <div class="home-contact-container">

    <h2>Contáctanos</h2>

    <form class="contact-form" action="https://formsubmit.co/sofiaandradamaquilladora@gmail.com" method="POST">

      <input type="text" name="nombre" placeholder="Nombre completo" required>

      <input type="tel" name="telefono" placeholder="Teléfono" required>

      <input type="email" name="email" placeholder="Correo electrónico" required>

      <textarea name="mensaje" placeholder="Escribe tu mensaje..." required></textarea>

      <button type="submit">Enviar mensaje</button>

      <input type="hidden" name="_captcha" value="false">

    </form>

  </div>

</section>

<!-- FOOTER -->

<footer>
  <p>© 2026 Sofía Andrada</p>
</footer>

<!-- SCRIPT MENU -->

<script>
const toggle = document.getElementById("menu-toggle");
const menu = document.getElementById("nav-menu");

toggle.addEventListener("click", () => {
  menu.classList.toggle("active");
});
</script>

</body>
</html>
